<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagram Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f0f0f7;
  --su:#ffffff;
  --s2:#f4f4fa;
  --s3:#ebebf4;
  --bd:#dddde8;
  --bd2:#c8c8d8;
  --tx:#0c0c1a;
  --t2:#5a5a78;
  --t3:#9898b8;
  --ac:#6366f1;
  --ach:#4f46e5;
  --atl:rgba(99,102,241,.08);
  --atm:rgba(99,102,241,.18);
  --sh1:0 1px 3px rgba(0,0,0,.07);
  --sh2:0 4px 20px rgba(0,0,0,.09);
  --sh3:0 12px 48px rgba(0,0,0,.14);
  --r:12px;--rs:7px;--t:.14s ease;
  --lnbg:#f7f7fd;--lnfg:#c0c0d8;
  --edbg:#fff;--edfg:#0c0c1a;
  --er-bg:#fef2f2;--er-fg:#dc2626;
  --grid:rgba(100,100,200,.08);
}
[data-theme=dark]{
  --bg:#09090f;
  --su:#111119;
  --s2:#17171f;
  --s3:#1f1f2b;
  --bd:#242432;
  --bd2:#323244;
  --tx:#e8e8f8;
  --t2:#6868a0;
  --t3:#323248;
  --ac:#818cf8;
  --ach:#6366f1;
  --atl:rgba(129,140,248,.10);
  --atm:rgba(129,140,248,.22);
  --sh1:0 1px 4px rgba(0,0,0,.6);
  --sh2:0 4px 24px rgba(0,0,0,.7);
  --sh3:0 12px 50px rgba(0,0,0,.8);
  --lnbg:#0c0c14;--lnfg:#2c2c40;
  --edbg:#0d0d18;--edfg:#dcdcf4;
  --er-bg:#1c0808;--er-fg:#f87171;
  --grid:rgba(150,150,255,.05);
}

html,body{height:100%;overflow:hidden;
  background:var(--bg);color:var(--tx);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:13px;line-height:1.5;
  -webkit-font-smoothing:antialiased}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--t3)}
::selection{background:var(--atm);color:var(--ac)}

/* ── Toolbar ──────────────────────────────────────────────────────────── */
#tb{
  height:52px;display:flex;align-items:center;gap:3px;
  padding:0 14px;background:var(--su);
  border-bottom:1px solid var(--bd);
  box-shadow:var(--sh1);flex-shrink:0;
  overflow-x:auto;overflow-y:hidden;z-index:20;position:relative;
}
#tb::-webkit-scrollbar{height:0}

.logo{display:flex;align-items:center;gap:9px;flex-shrink:0;margin-right:6px}
.lm{
  width:30px;height:30px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,#7c6ff7,#6366f1,#4f46e5);
  background-size:200% 200%;animation:lgr 4s ease infinite;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:#fff;box-shadow:0 2px 12px rgba(99,102,241,.4);
}
@keyframes lgr{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.ln{font-weight:700;font-size:14.5px;letter-spacing:-.35px;color:var(--tx);white-space:nowrap}
.ln b{color:var(--ac);font-weight:700}

.sep{width:1px;height:20px;background:var(--bd);flex-shrink:0;margin:0 8px}

#tabs{
  display:flex;background:var(--s2);border:1px solid var(--bd);
  border-radius:10px;padding:3px;gap:2px;flex-shrink:0;
}
.tab{
  padding:4px 15px;border-radius:8px;font-size:12.5px;font-weight:600;
  cursor:pointer;border:none;background:transparent;color:var(--t2);
  transition:all var(--t);white-space:nowrap;font-family:inherit;letter-spacing:-.1px;
}
.tab:hover{background:var(--s3);color:var(--tx)}
.tab.on{background:var(--su);color:var(--ac);box-shadow:var(--sh1)}

button,select{
  font-family:'Inter',-apple-system,sans-serif;font-size:12.5px;font-weight:500;
  cursor:pointer;border:1px solid transparent;border-radius:var(--rs);
  background:transparent;color:var(--t2);padding:5px 10px;
  white-space:nowrap;flex-shrink:0;
  transition:all var(--t);
  display:inline-flex;align-items:center;gap:5px;letter-spacing:-.1px;
}
button:hover{background:var(--s2);color:var(--tx)}
button:active{transform:scale(.96)}
.ol{border-color:var(--bd);background:var(--su);color:var(--tx)}
.ol:hover{border-color:var(--ac)!important;background:var(--atl)!important;color:var(--ac)!important}
.ic{padding:5px 8px;font-size:15px}
select{border:1px solid var(--bd);background:var(--su);color:var(--tx);max-width:136px}
select:hover{border-color:var(--ac)}

.tg{display:flex;align-items:center;gap:3px;flex-shrink:0}
.te{margin-left:auto;display:flex;align-items:center;gap:3px;flex-shrink:0}

/* ── Layout ───────────────────────────────────────────────────────────── */
#main{display:flex;height:calc(100vh - 52px - 24px);overflow:hidden}

/* ── Editor ───────────────────────────────────────────────────────────── */
#ep{
  flex:0 0 42%;min-width:140px;display:flex;flex-direction:column;
  border-right:1px solid var(--bd);overflow:hidden;background:var(--edbg);
}
#ew{flex:1;display:flex;overflow:hidden}
#ln{
  width:46px;flex-shrink:0;padding:14px 0;
  background:var(--lnbg);border-right:1px solid var(--bd);
  overflow:hidden;user-select:none;text-align:right;
  font:12px/1.7 'Menlo','Consolas',monospace;
  color:var(--lnfg);pointer-events:none;
}
#ln span{display:block;padding-right:10px}
#code{
  flex:1;resize:none;border:none;outline:none;padding:14px 16px;
  font:12.5px/1.7 'Menlo','Consolas',monospace;
  background:var(--edbg);color:var(--edfg);
  tab-size:2;white-space:pre;overflow:auto;caret-color:var(--ac);
}

/* ── Divider ──────────────────────────────────────────────────────────── */
#dvd{
  flex:0 0 3px;cursor:col-resize;flex-shrink:0;z-index:2;
  background:var(--bd);position:relative;transition:background var(--t);
}
#dvd::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 10%,var(--ac) 50%,transparent 90%);
  opacity:0;transition:opacity .2s;
}
#dvd:hover,#dvd.drag{background:transparent}
#dvd:hover::after,#dvd.drag::after{opacity:1}

/* ── Right pane ───────────────────────────────────────────────────────── */
#rp{flex:1;min-width:140px;display:flex;flex-direction:column;overflow:hidden}

/* ── Mermaid canvas ───────────────────────────────────────────────────── */
#mv{
  flex:1;overflow:hidden;position:relative;cursor:grab;
  background-color:var(--bg);
  background-image:radial-gradient(circle,var(--grid) 1px,transparent 1px);
  background-size:28px 28px;
}
#mv.pan{cursor:grabbing}
#svgw{padding:32px}
#svgw svg{max-width:none;display:block;
  filter:drop-shadow(0 4px 24px rgba(0,0,0,.12))}

/* empty state */
#empty{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;pointer-events:none;
}
.ei{
  width:64px;height:64px;border-radius:20px;
  background:var(--su);border:1px solid var(--bd);box-shadow:var(--sh2);
  display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--t3);
}
.eh{font-size:14px;font-weight:600;color:var(--t2)}
.es{font-size:12px;color:var(--t3)}

/* error bubble */
#mmerr{
  display:none;position:absolute;top:12px;left:12px;right:84px;z-index:5;
  padding:10px 14px;background:var(--er-bg);color:var(--er-fg);
  border:1px solid var(--er-fg);border-radius:10px;
  font:11.5px/1.5 'Menlo',monospace;white-space:pre-wrap;word-break:break-word;
  box-shadow:var(--sh2);
}

/* floating zoom pill */
#zpill{
  position:absolute;bottom:16px;right:16px;z-index:5;
  display:flex;align-items:center;
  background:var(--su);border:1px solid var(--bd);
  border-radius:10px;padding:3px;gap:1px;box-shadow:var(--sh2);
}
#zpill button{padding:4px 9px;font-size:13px;border-radius:7px;border:none;background:transparent;color:var(--t2)}
#zpill button:hover{background:var(--s2);color:var(--tx)}
#zpill button:active{transform:scale(.93)}
#zlbl{font-size:11px;font-weight:600;color:var(--t2);min-width:42px;text-align:center;padding:0 2px}

/* floating type badge */
#ttag{
  position:absolute;top:12px;right:12px;z-index:5;
  background:var(--su);border:1px solid var(--bd);
  border-radius:8px;padding:4px 12px;
  font-size:11px;font-weight:700;color:var(--ac);box-shadow:var(--sh1);
}

/* ── Markdown view ────────────────────────────────────────────────────── */
#mdv{
  flex:1;overflow-y:auto;background:var(--bg);
  display:none;padding:24px;
}

/* card */
.mdb{
  max-width:720px;margin:0 auto;
  background:var(--su);border:1px solid var(--bd);
  border-radius:var(--r);padding:48px 56px 80px;box-shadow:var(--sh2);
}
.mdb h1,.mdb h2,.mdb h3,.mdb h4{
  font-weight:700;line-height:1.3;margin:1.8em 0 .6em;color:var(--tx);
}
.mdb h1:first-child,.mdb h2:first-child{margin-top:0}
.mdb h1{font-size:1.85em;border-bottom:2px solid var(--bd);padding-bottom:.35em}
.mdb h2{font-size:1.42em;border-bottom:1px solid var(--bd);padding-bottom:.25em}
.mdb h3{font-size:1.16em}
.mdb h4{font-size:1em;font-weight:600}
.mdb p{margin:.9em 0;font-size:15px;line-height:1.8}
.mdb p:first-child{margin-top:0}
.mdb a{color:var(--ac);text-decoration:none}
.mdb a:hover{text-decoration:underline}
.mdb strong{font-weight:700}
.mdb em{font-style:italic}
.mdb code{
  font-family:'Menlo','Consolas',monospace;font-size:.85em;
  background:var(--s2);padding:.18em .48em;
  border-radius:5px;border:1px solid var(--bd);
}
.mdb pre{
  background:var(--s2);border:1px solid var(--bd);
  border-radius:10px;padding:16px 20px;overflow-x:auto;margin:1.4em 0;
}
.mdb pre code{background:none;border:none;padding:0;font-size:.875em;color:var(--edfg)}
.mdb blockquote{
  border-left:3px solid var(--ac);margin:1.4em 0;
  padding:.7em 1.4em;background:var(--atl);border-radius:0 10px 10px 0;
}
.mdb blockquote p{margin:0;font-size:14px;color:var(--t2)}
.mdb table{border-collapse:collapse;width:100%;margin:1.4em 0;font-size:.93em}
.mdb th,.mdb td{border:1px solid var(--bd);padding:9px 14px;text-align:left}
.mdb th{background:var(--s2);font-weight:600;font-size:.9em}
.mdb tr:nth-child(even) td{background:var(--s2)}
.mdb ul,.mdb ol{margin:.8em 0;padding-left:1.8em}
.mdb li{margin:.4em 0;font-size:15px;line-height:1.7}
.mdb hr{border:none;border-top:1px solid var(--bd);margin:2.5em 0}
.mdb img{max-width:100%;border-radius:var(--r)}

/* mermaid inside markdown */
.mmw{
  display:flex;justify-content:center;margin:1.6em 0;padding:20px;
  background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);overflow-x:auto;
}
.mmw svg{max-width:100%}
.mme{color:var(--er-fg);background:var(--er-bg);padding:10px 14px;border-radius:7px;font:12px 'Menlo',monospace;width:100%}

/* ── Status bar ───────────────────────────────────────────────────────── */
#sb{
  height:24px;display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;background:var(--su);border-top:1px solid var(--bd);
  font-size:11px;flex-shrink:0;user-select:none;gap:8px;color:var(--t2);
}
.sbl,.sbr{display:flex;align-items:center;gap:14px}
#stm{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.07em;
  color:var(--ac);background:var(--atl);padding:1px 9px;border-radius:20px}

/* ── Toast ────────────────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:36px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--tx);color:var(--su);
  padding:8px 20px;border-radius:24px;font-size:12.5px;font-weight:600;
  opacity:0;transition:opacity .2s,transform .2s;
  pointer-events:none;z-index:1000;white-space:nowrap;box-shadow:var(--sh3);
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Focus mode ───────────────────────────────────────────────────────── */
body.focus #tb,body.focus #ep,body.focus #dvd,body.focus #sb{display:none!important}
body.focus #main{height:100vh}

/* ── Responsive ───────────────────────────────────────────────────────── */
@media(max-width:600px){
  #main{flex-direction:column}
  #ep{flex:0 0 44%!important;min-height:0;border-right:none;border-bottom:1px solid var(--bd)}
  #rp{flex:1!important}
  #dvd{flex:0 0 3px!important;cursor:row-resize}
  .mdb{padding:24px 20px 60px;border-radius:0;border-left:none;border-right:none}
}
</style>
</head>

(function(){
'use strict';

const MM={
  flowchart:`flowchart TD
    Start([Start]) --> Login[Anmelden]
    Login --> Auth{Authentifiziert}
    Auth -- Ja --> Home[Dashboard]
    Auth -- Nein --> Err[Fehler]
    Err --> Login
    Home --> Ende([Ende])`,

  sequence:`sequenceDiagram
    participant B as Browser
    participant S as Server
    participant D as Datenbank
    B->>S: GET /api/daten
    S->>D: SELECT * FROM items
    D-->>S: Ergebnisse
    S-->>B: JSON Response
    B->>B: UI aktualisieren`,

  class:`classDiagram
    class Tier {
        +String name
        +int alter
        +lautGeben() void
    }
    class Hund {
        +String rasse
        +apportieren() void
    }
    class Katze {
        +bool indoor
        +schnurren() void
    }
    Tier <|-- Hund
    Tier <|-- Katze`,

  state:`stateDiagram-v2
    [*] --> Bereit
    Bereit --> Laufend : Starten
    Laufend --> Erfolg : OK
    Laufend --> Fehler : Abbruch
    Erfolg --> Bereit : Reset
    Fehler --> Bereit : Wiederholen
    Fehler --> [*] : Beenden`,

  er:`erDiagram
    KUNDE ||--o{ BESTELLUNG : "gibt auf"
    KUNDE {
        int id PK
        string name
        string email
    }
    BESTELLUNG ||--|{ POSITION : "enthaelt"
    BESTELLUNG {
        int id PK
        date datum
        string status
    }
    POSITION {
        int id PK
        int menge
        float preis
    }`,

  gantt:`gantt
    title Projektplan
    dateFormat  YYYY-MM-DD
    section Phase 1
    Konzept     :done,   2024-01-01, 7d
    Design      :active, 2024-01-08, 5d
    section Phase 2
    Entwicklung :        2024-01-13, 10d
    Testing     :        2024-01-23, 5d
    section Phase 3
    Deployment  :        2024-01-28, 3d`,

  pie:`pie title Technologie-Stack
    "TypeScript" : 40
    "Python" : 25
    "Go" : 20
    "Rust" : 10
    "Sonstige" : 5`,

  git:`gitGraph
    commit id: "Initial"
    branch feature/auth
    checkout feature/auth
    commit id: "Login"
    commit id: "Logout"
    checkout main
    merge feature/auth
    branch hotfix
    checkout hotfix
    commit id: "Fix"
    checkout main
    merge hotfix`,

  mindmap:`mindmap
  root((Mermaid))
    Diagramme
      Flowchart
      Sequence
      Class
    Features
      Live Preview
      Export
    Export
      SVG
      PNG`,

  timeline:`timeline
    title Mermaid Geschichte
    2019 : Version 8
    2020 : ER-Diagramme
    2021 : GitGraph
    2022 : Mindmap : Timeline
    2023 : Version 10`
};

const MD_EXAMPLE=`# Projekt-Dokumentation

// DOM refs
const $=id=>document.getElementById(id);
const codeEl=$('code'), lnEl=$('ln'),
      mvEl=$('mv'),   svgwEl=$('svgw'),
      mdvEl=$('mdv'), mdbEl=$('mdb'),
      emptyEl=$('empty'), mmerrEl=$('mmerr'),
      dtEl=$('dtype'), zlblEl=$('zlbl'),
      epEl=$('ep'),  rpEl=$('rp'), dvdEl=$('dvd'),
      gmEl=$('gm'),  gdEl=$('gd'),
      stcEl=$('stc'), stnEl=$('stn'),
      stiEl=$('sti'), stmEl=$('stm'),
      toastEl=$('toast');

// State
let mode='mermaid', isDark;
let timer, zoom=1, px=0, py=0;
let pan=false, mx0,my0,px0,py0, rsz=false;
let mmId=0, mdId=0;

// ── setMode ─────────────────────────────────────────────────────────────────
// BUG FIX: always set explicit display value, never '' which restores CSS display:none
function setMode(m){
  mode=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.mode===m));
  const mm=m==='mermaid';
  gmEl.style.display  = mm ? 'flex'  : 'none';
  gdEl.style.display  = mm ? 'none'  : 'flex';
  mvEl.style.display  = mm ? 'block' : 'none';
  mdvEl.style.display = mm ? 'none'  : 'block'; // explicit 'block', not ''
  stmEl.textContent   = mm ? 'MERMAID' : 'MARKDOWN';
  localStorage.setItem('ds-mode',m);
  scheduleRender();
}

// ── Mermaid ──────────────────────────────────────────────────────────────────
function initMermaid(dark){
  mermaid.initialize({startOnLoad:false,theme:dark?'dark':'default',securityLevel:'loose'});
}

function scheduleRender(){clearTimeout(timer);timer=setTimeout(render,300)}
async function render(){mode==='mermaid'?await renderMM():await renderMD()}

async function renderMM(){
  const src=codeEl.value.trim();
  if(!src){
    svgwEl.innerHTML='';
    emptyEl.style.display='flex';
    mmerrEl.style.display='none';
    dtEl.textContent='—'; stiEl.textContent='';
    return;
  }
  emptyEl.style.display='none';
  localStorage.setItem('ds-mm',codeEl.value);
  const type=src.split(/[\s{([]/)[0].toLowerCase();
  dtEl.textContent=type||'—'; stiEl.textContent=type||'';

  const id='mg'+(++mmId);
  try{
    const{svg}=await mermaid.render(id,src);
    mmerrEl.style.display='none';
    svgwEl.innerHTML=svg;   // only replaces #svgw, overlays preserved
    applyT();
  }catch(e){
    const msg=String(e.message||e).split('\n')[0].replace(/^\s*Error:\s*/i,'');
    mmerrEl.textContent='⚠ '+msg;
    mmerrEl.style.display='block';
    const stale=document.getElementById(id);
    if(stale)stale.remove();
  }
}

// ── Markdown ─────────────────────────────────────────────────────────────────
async function renderMD(){
  const src=codeEl.value;
  if(!src.trim()){
    mdbEl.innerHTML='<p style="color:var(--t3);text-align:center;padding:52px 0;font-size:14px">← Markdown eingeben</p>';
    return;
  }
  localStorage.setItem('ds-md',codeEl.value);
  mdbEl.innerHTML=marked.parse(src,{gfm:true,breaks:false});

  for(const block of mdbEl.querySelectorAll('pre>code.language-mermaid')){
    const code=block.textContent.trim();
    const pre=block.parentElement;
    const wrap=document.createElement('div');
    wrap.className='mmw';
    pre.replaceWith(wrap);
    try{
      const id='mm'+(++mdId)+'_'+Date.now();
      const{svg}=await mermaid.render(id,code);
      wrap.innerHTML=svg;
    }catch(e){
      wrap.innerHTML='<div class="mme">⚠ '+esc(String(e.message||e).split('\n')[0])+'</div>';
    }
  }
  stiEl.textContent=src.trim().split(/\s+/).filter(Boolean).length+' Wörter';
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── Zoom / Pan ────────────────────────────────────────────────────────────────
function applyT(){
  const svg=svgwEl.querySelector('svg');
  if(!svg)return;
  svg.style.transformOrigin='0 0';
  svg.style.transform=`translate(${px}px,${py}px) scale(${zoom})`;
  zlblEl.textContent=Math.round(zoom*100)+'%';
}
function resetV(){zoom=1;px=0;py=0;applyT()}

mvEl.addEventListener('wheel',e=>{
  if(mode!=='mermaid')return;
  e.preventDefault();
  zoom=Math.max(.1,Math.min(10,zoom*(e.deltaY<0?1.12:.89)));
  applyT();
},{passive:false});

mvEl.addEventListener('mousedown',e=>{
  if(e.button||mode!=='mermaid')return;
  if(e.target.closest('#zpill')||e.target.closest('#ttag'))return;
  e.preventDefault();
  pan=true;mx0=e.clientX;my0=e.clientY;px0=px;py0=py;
  mvEl.classList.add('pan');
});

// ── Resize ────────────────────────────────────────────────────────────────────
dvdEl.addEventListener('mousedown',e=>{
  rsz=true;dvdEl.classList.add('drag');
  document.body.style.cursor='col-resize';
  document.body.style.userSelect='none';
  e.preventDefault();
});
document.addEventListener('mousemove',e=>{
  if(pan){px=px0+(e.clientX-mx0);py=py0+(e.clientY-my0);applyT()}
  if(rsz){
    const r=$('main').getBoundingClientRect();
    const p=Math.max(15,Math.min(85,(e.clientX-r.left)/r.width*100));
    epEl.style.flex=`0 0 ${p}%`;
    rpEl.style.flex=`0 0 ${100-p}%`;
  }
});
document.addEventListener('mouseup',()=>{
  if(pan){pan=false;mvEl.classList.remove('pan')}
  if(rsz){rsz=false;dvdEl.classList.remove('drag');document.body.style.cursor='';document.body.style.userSelect=''}
});

// ── Line numbers ──────────────────────────────────────────────────────────────
function updateLN(){
  const n=codeEl.value.split('\n').length,cur=lnEl.children.length;
  if(n===cur)return;
  if(n>cur){
    const f=document.createDocumentFragment();
    for(let i=cur+1;i<=n;i++){const s=document.createElement('span');s.textContent=i;f.appendChild(s)}
    lnEl.appendChild(f);
  }else while(lnEl.children.length>n)lnEl.lastChild.remove();
}
codeEl.addEventListener('scroll',()=>{lnEl.scrollTop=codeEl.scrollTop});

// ── Status ────────────────────────────────────────────────────────────────────
function updateSt(){
  const v=codeEl.value,b=v.slice(0,codeEl.selectionStart).split('\n');
  stcEl.textContent=`Ln ${b.length}, Sp ${b[b.length-1].length+1}`;
  const lines=v.split('\n').length;
  stnEl.textContent=`${lines} ${lines===1?'Zeile':'Zeilen'} · ${v.length} Zeichen`;
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
codeEl.addEventListener('keydown',e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const s=codeEl.selectionStart,end=codeEl.selectionEnd;
    codeEl.value=codeEl.value.slice(0,s)+'  '+codeEl.value.slice(end);
    codeEl.selectionStart=codeEl.selectionEnd=s+2;
    updateLN();scheduleRender();
  }
  if(e.key==='Enter'&&e.ctrlKey){e.preventDefault();clearTimeout(timer);render()}
});
codeEl.addEventListener('input',()=>{updateLN();updateSt();scheduleRender()});
codeEl.addEventListener('keyup',updateSt);
codeEl.addEventListener('click',updateSt);
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.body.classList.remove('focus')});

// ── Theme ─────────────────────────────────────────────────────────────────────
function applyTheme(dark){
  isDark=dark;
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  $('b-theme').textContent=dark?'☀':'☾';
  localStorage.setItem('ds-theme',dark?'dark':'light');
  initMermaid(dark);render();
}

// ── Share ─────────────────────────────────────────────────────────────────────
function toHash(m,c){try{return btoa(unescape(encodeURIComponent(JSON.stringify({m,c}))))}catch{return null}}
function fromHash(h){try{return JSON.parse(decodeURIComponent(escape(atob(h))))}catch{return null}}

// ── Toast ─────────────────────────────────────────────────────────────────────
let ttmr;
function toast(msg){
  toastEl.textContent=msg;toastEl.classList.add('on');
  clearTimeout(ttmr);ttmr=setTimeout(()=>toastEl.classList.remove('on'),2400);
}

// ── Exports ───────────────────────────────────────────────────────────────────
function exportSVG(){
  const svg=svgwEl.querySelector('svg');
  if(!svg)return toast('Kein Diagramm vorhanden.');
  dl(URL.createObjectURL(new Blob([svg.outerHTML],{type:'image/svg+xml'})),'diagram.svg');
}
function exportPNG(){
  const svg=svgwEl.querySelector('svg');
  if(!svg)return toast('Kein Diagramm vorhanden.');
  const sc=2,vb=svg.viewBox.baseVal;
  const w=vb.width||svg.getBoundingClientRect().width||800;
  const h=vb.height||svg.getBoundingClientRect().height||600;
  const c=document.createElement('canvas');
  c.width=w*sc;c.height=h*sc;
  const ctx=c.getContext('2d');
  ctx.scale(sc,sc);
  ctx.fillStyle=isDark?'#09090f':'#fff';
  ctx.fillRect(0,0,w,h);
  const img=new Image();
  img.onload=()=>{ctx.drawImage(img,0,0);dl(c.toDataURL('image/png'),'diagram.png')};
  img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(new XMLSerializer().serializeToString(svg));
}
function copySVG(){
  const svg=svgwEl.querySelector('svg');
  if(!svg)return toast('Kein Diagramm vorhanden.');
  navigator.clipboard.writeText(svg.outerHTML).then(()=>toast('SVG kopiert ✓'));
}
function exportMD(){
  dl(URL.createObjectURL(new Blob([codeEl.value],{type:'text/markdown;charset=utf-8'})),'dokument.md');
}
function exportHTML(){
  const raw=codeEl.value.match(/^#+ (.+)/m);
  const title=(raw?raw[1]:'Dokument').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
  const out=`<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${title}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{padding:40px 20px 80px;background:#f0f0f7;font-family:'Inter',-apple-system,sans-serif;font-size:15px;line-height:1.8;color:#0c0c1a}
.w{max-width:720px;margin:0 auto;background:#fff;border:1px solid #dddde8;border-radius:12px;padding:48px 56px 80px;box-shadow:0 4px 20px rgba(0,0,0,.09)}
h1,h2,h3,h4{font-weight:700;line-height:1.3;margin:1.8em 0 .6em}
h1:first-child,h2:first-child{margin-top:0}
h1{font-size:1.85em;border-bottom:2px solid #dddde8;padding-bottom:.35em}
h2{font-size:1.42em;border-bottom:1px solid #dddde8;padding-bottom:.25em}
h3{font-size:1.16em}p{margin:.9em 0}
a{color:#6366f1;text-decoration:none}a:hover{text-decoration:underline}
code{font-family:'Menlo',monospace;font-size:.85em;background:#f4f4fa;padding:.18em .48em;border-radius:5px;border:1px solid #dddde8}
pre{background:#f4f4fa;border:1px solid #dddde8;border-radius:10px;padding:16px 20px;overflow-x:auto;margin:1.4em 0}
pre code{background:none;border:none;padding:0;font-size:.875em}
blockquote{border-left:3px solid #6366f1;margin:1.4em 0;padding:.7em 1.4em;background:rgba(99,102,241,.06);border-radius:0 10px 10px 0}
blockquote p{margin:0;color:#5a5a78}
table{border-collapse:collapse;width:100%;margin:1.4em 0}
th,td{border:1px solid #dddde8;padding:9px 14px;text-align:left}
th{background:#f4f4fa;font-weight:600}tr:nth-child(even) td{background:#f7f7fd}
ul,ol{margin:.8em 0;padding-left:1.8em}li{margin:.4em 0}
hr{border:none;border-top:1px solid #dddde8;margin:2.5em 0}
img{max-width:100%;border-radius:10px}
.mmw{display:flex;justify-content:center;margin:1.6em 0;padding:20px;background:#f4f4fa;border:1px solid #dddde8;border-radius:10px;overflow-x:auto}
.mmw svg{max-width:100%}
</style></head><body><div class="w">${mdbEl.innerHTML}</div></body></html>`;
  dl(URL.createObjectURL(new Blob([out],{type:'text/html;charset=utf-8'})),'dokument.html');
}
function copyHTML(){navigator.clipboard.writeText(mdbEl.innerHTML).then(()=>toast('HTML kopiert ✓'))}
function dl(url,name){const a=document.createElement('a');a.href=url;a.download=name;a.click()}

// ── Wiring ────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab=>tab.addEventListener('click',()=>{
  const next=tab.dataset.mode;
  if(next===mode)return;
  localStorage.setItem('ds-'+mode,codeEl.value);
  const saved=localStorage.getItem('ds-'+next);
  codeEl.value=saved!==null?saved:(next==='markdown'?MD_EXAMPLE:MM.flowchart);
  updateLN();updateSt();setMode(next);
}));

$('b-theme') .addEventListener('click',()=>applyTheme(!isDark));
$('b-svg')   .addEventListener('click',exportSVG);
$('b-png')   .addEventListener('click',exportPNG);
$('b-csvg')  .addEventListener('click',copySVG);
$('b-md')    .addEventListener('click',exportMD);
$('b-html')  .addEventListener('click',exportHTML);
$('b-cht')   .addEventListener('click',copyHTML);
$('b-zi')    .addEventListener('click',()=>{zoom=Math.min(10,zoom*1.25);applyT()});
$('b-zo')    .addEventListener('click',()=>{zoom=Math.max(.1,zoom/1.25);applyT()});
$('b-zr')    .addEventListener('click',resetV);
$('b-focus') .addEventListener('click',()=>document.body.classList.toggle('focus'));
$('b-share') .addEventListener('click',()=>{
  const h=toHash(mode,codeEl.value);
  if(!h)return toast('Fehler beim Erstellen des Links.');
  history.replaceState(null,'',location.pathname+'#'+h);
  navigator.clipboard.writeText(location.href).then(()=>toast('Link kopiert ✓'));
});
$('sel').addEventListener('change',function(){
  const c=MM[this.value];
  if(c){codeEl.value=c;updateLN();updateSt();scheduleRender()}
  this.value='';
});

// ── Boot ──────────────────────────────────────────────────────────────────────
const savedTheme=localStorage.getItem('ds-theme');
isDark=savedTheme?savedTheme==='dark':window.matchMedia('(prefers-color-scheme: dark)').matches;
document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
$('b-theme').textContent=isDark?'☀':'☾';
initMermaid(isDark);

const hash=location.hash.slice(1);
if(hash){
  const d=fromHash(hash);
  if(d&&d.c!==undefined){codeEl.value=d.c;updateLN();updateSt();setMode(d.m||'mermaid')}
  else boot();
}else boot();

function boot(){
  const m=localStorage.getItem('ds-mode')||'mermaid';
  const s=localStorage.getItem('ds-'+m);
  codeEl.value=s!==null?s:(m==='markdown'?MD_EXAMPLE:MM.flowchart);
  updateLN();updateSt();setMode(m);
}

})();
</script>
</body>
</html>
