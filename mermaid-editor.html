<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagram Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap">
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f7f7fb;
  --su:#ffffff;
  --s2:#f1f1f6;
  --s3:#e8e8f0;
  --bd:#e0e0ea;
  --bd2:#c8c8d8;
  --tx:#0d0d1a;
  --t2:#64647a;
  --t3:#a0a0b8;
  --ac:#6366f1;
  --ach:#4f46e5;
  --at:rgba(99,102,241,.1);
  --er-bg:#fef2f2;
  --er-fg:#dc2626;
  --sh1:0 1px 3px rgba(0,0,0,.06);
  --sh2:0 4px 16px rgba(0,0,0,.08);
  --r:10px;--rs:6px;--t:.15s ease;
  --ln:#f4f4f9;--lnc:#c8c8da;
  --ed:#ffffff;--edfg:#0d0d1a;
}
[data-theme=dark]{
  --bg:#09090e;
  --su:#111118;
  --s2:#18181f;
  --s3:#22222c;
  --bd:#22222c;
  --bd2:#30303c;
  --tx:#ededfa;
  --t2:#7878a0;
  --t3:#383850;
  --ac:#818cf8;
  --ach:#6366f1;
  --at:rgba(129,140,248,.13);
  --er-bg:#1a0a0a;
  --er-fg:#f87171;
  --sh1:0 1px 4px rgba(0,0,0,.5);
  --sh2:0 4px 20px rgba(0,0,0,.7);
  --ln:#0c0c13;--lnc:#2c2c3c;
  --ed:#0e0e16;--edfg:#e0e0f5;
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ── Toolbar ───────────────────────────────────────────────────────────── */
#tb{
  height:52px;display:flex;align-items:center;gap:2px;padding:0 16px;
  background:var(--su);border-bottom:1px solid var(--bd);
  box-shadow:var(--sh1);flex-shrink:0;overflow-x:auto;overflow-y:hidden;
  position:relative;z-index:20;
}

/* logo */
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-right:4px}
.logo-mark{
  width:28px;height:28px;border-radius:8px;
  background:linear-gradient(135deg,var(--ac),var(--ach));
  display:flex;align-items:center;justify-content:center;
  font-size:15px;color:#fff;box-shadow:0 2px 8px var(--at);
}
.logo-name{font-weight:700;font-size:15px;letter-spacing:-.4px;color:var(--tx);white-space:nowrap}
.logo-name b{color:var(--ac);font-weight:700}

.sep{width:1px;height:20px;background:var(--bd);flex-shrink:0;margin:0 8px}

/* mode tabs */
#tabs{
  display:flex;background:var(--s2);border:1px solid var(--bd);
  border-radius:10px;padding:3px;gap:2px;flex-shrink:0;
}
.tab{
  padding:4px 15px;border-radius:8px;font-size:12.5px;font-weight:600;
  cursor:pointer;border:none;background:transparent;color:var(--t2);
  transition:all var(--t);white-space:nowrap;font-family:inherit;
}
.tab:hover{background:var(--s3);color:var(--tx)}
.tab.on{background:var(--su);color:var(--tx);box-shadow:var(--sh1)}

/* buttons */
button,select{
  font-family:'Inter',-apple-system,sans-serif;
  font-size:12.5px;font-weight:500;cursor:pointer;
  border:1px solid transparent;border-radius:var(--rs);
  background:transparent;color:var(--t2);
  padding:5px 10px;white-space:nowrap;flex-shrink:0;
  transition:background var(--t),color var(--t),border-color var(--t);
  display:inline-flex;align-items:center;gap:5px;
}
button:hover{background:var(--s2);color:var(--tx)}
button.ol{border-color:var(--bd);background:var(--su);color:var(--tx)}
button.ol:hover{border-color:var(--ac);background:var(--at);color:var(--ac)}
button.ic{padding:5px 8px;font-size:15px;border-radius:var(--rs)}

select{border:1px solid var(--bd);background:var(--su);color:var(--tx);max-width:138px}
select:hover{border-color:var(--ac)}

#badge{
  margin-left:auto;display:flex;align-items:center;gap:6px;
  font-size:11.5px;color:var(--t2);white-space:nowrap;flex-shrink:0;
}
#dtype{
  font-weight:600;font-size:11px;color:var(--ac);
  background:var(--at);padding:2px 10px;border-radius:20px;
}

/* ── Layout ────────────────────────────────────────────────────────────── */
#main{display:flex;height:calc(100vh - 52px - 26px);overflow:hidden}

/* ── Editor pane ───────────────────────────────────────────────────────── */
#ep{
  flex:0 0 42%;min-width:140px;display:flex;flex-direction:column;
  background:var(--su);border-right:1px solid var(--bd);overflow:hidden;
}
.phd{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 12px;background:var(--s2);border-bottom:1px solid var(--bd);
  font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;
  color:var(--t3);flex-shrink:0;min-height:28px;
}
.phd small{font-weight:400;text-transform:none;letter-spacing:0;font-size:10.5px}

#ew{flex:1;display:flex;overflow:hidden;background:var(--ed)}
#ln{
  width:44px;flex-shrink:0;padding:12px 0;background:var(--ln);
  border-right:1px solid var(--bd);overflow:hidden;user-select:none;
  text-align:right;font:12px/1.6 'Menlo','Consolas',monospace;
  color:var(--lnc);pointer-events:none;
}
#ln span{display:block;padding-right:10px}
#code{
  flex:1;resize:none;border:none;outline:none;padding:12px 14px;
  font:12px/1.6 'Menlo','Consolas',monospace;
  background:var(--ed);color:var(--edfg);
  tab-size:2;white-space:pre;overflow:auto;caret-color:var(--ac);
}

/* ── Divider ───────────────────────────────────────────────────────────── */
#div{
  flex:0 0 4px;cursor:col-resize;background:var(--bd);
  flex-shrink:0;z-index:2;position:relative;
  transition:background var(--t);
}
#div:hover,#div.drag{background:var(--ac)}

/* ── Right pane ────────────────────────────────────────────────────────── */
#rp{flex:1;min-width:140px;display:flex;flex-direction:column;overflow:hidden}
#rhd{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 12px;background:var(--s2);border-bottom:1px solid var(--bd);
  font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;
  color:var(--t3);flex-shrink:0;min-height:28px;
}
#zbar{display:flex;align-items:center;gap:2px}
#zbar button{padding:3px 7px;font-size:14px}
#zlbl{font-size:11px;color:var(--t2);min-width:40px;text-align:center;
  font-weight:500;text-transform:none;letter-spacing:0}

#errbox{
  display:none;margin:10px 12px 0;padding:10px 14px;flex-shrink:0;
  background:var(--er-bg);color:var(--er-fg);
  border:1px solid var(--er-fg);border-radius:8px;
  font:11.5px/1.5 'Menlo','Consolas',monospace;
  white-space:pre-wrap;word-break:break-word;opacity:.9;
}

/* mermaid canvas */
#mv{
  flex:1;overflow:hidden;padding:28px;cursor:grab;
  position:relative;background:var(--bg);
}
#mv.pan{cursor:grabbing}
#mv svg{max-width:none;display:block}

#empty{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  color:var(--t3);pointer-events:none;
}
.ei{
  width:56px;height:56px;border-radius:16px;
  background:var(--s2);border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;color:var(--t3);
}
.eh{font-size:13px;color:var(--t3)}
.es{font-size:11.5px;color:var(--t3);opacity:.7}

/* ── Markdown view ─────────────────────────────────────────────────────── */
#mdv{flex:1;overflow-y:auto;background:var(--bg);display:none}

.mdb{
  max-width:740px;margin:0 auto;padding:40px 48px 80px;
  font-size:15px;line-height:1.8;color:var(--tx);
}
.mdb h1,.mdb h2,.mdb h3,.mdb h4{
  font-weight:700;line-height:1.3;margin:1.8em 0 .6em;color:var(--tx);
}
.mdb h1:first-child,.mdb h2:first-child{margin-top:0}
.mdb h1{font-size:1.9em;border-bottom:2px solid var(--bd);padding-bottom:.35em}
.mdb h2{font-size:1.45em;border-bottom:1px solid var(--bd);padding-bottom:.25em}
.mdb h3{font-size:1.18em}
.mdb h4{font-size:1em;font-weight:600}
.mdb p{margin:.9em 0}
.mdb p:first-child{margin-top:0}
.mdb a{color:var(--ac);text-decoration:none;border-bottom:1px solid transparent;transition:border-color var(--t)}
.mdb a:hover{border-bottom-color:var(--ac)}
.mdb strong{font-weight:700}
.mdb em{font-style:italic}
.mdb code{
  font-family:'Menlo','Consolas',monospace;font-size:.85em;
  background:var(--s2);color:var(--tx);
  padding:.18em .48em;border-radius:5px;border:1px solid var(--bd);
}
.mdb pre{
  background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);
  padding:16px 20px;overflow-x:auto;margin:1.4em 0;
}
.mdb pre code{background:none;border:none;padding:0;font-size:.875em;color:var(--edfg)}
.mdb blockquote{
  border-left:3px solid var(--ac);margin:1.4em 0;
  padding:.7em 1.4em;background:var(--at);border-radius:0 var(--r) var(--r) 0;
}
.mdb blockquote p{margin:0;color:var(--t2)}
.mdb table{border-collapse:collapse;width:100%;margin:1.4em 0;font-size:.93em}
.mdb th,.mdb td{border:1px solid var(--bd);padding:9px 14px;text-align:left}
.mdb th{background:var(--s2);font-weight:600;font-size:.9em}
.mdb tr:nth-child(even) td{background:var(--s2)}
.mdb ul,.mdb ol{margin:.8em 0;padding-left:1.8em}
.mdb li{margin:.4em 0}
.mdb li>ul,.mdb li>ol{margin:.2em 0}
.mdb hr{border:none;border-top:1px solid var(--bd);margin:2.5em 0}
.mdb img{max-width:100%;border-radius:var(--r)}

/* embedded mermaid in markdown */
.mmw{
  display:flex;justify-content:center;margin:1.6em 0;padding:20px;
  background:var(--su);border:1px solid var(--bd);border-radius:var(--r);
  overflow-x:auto;box-shadow:var(--sh1);
}
.mmw svg{max-width:100%}
.mme{
  color:var(--er-fg);background:var(--er-bg);padding:10px 14px;
  border-radius:var(--rs);font:12px/1.5 'Menlo',monospace;width:100%;
}

/* ── Status bar ────────────────────────────────────────────────────────── */
#sb{
  height:26px;display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;background:var(--su);border-top:1px solid var(--bd);
  font-size:11px;flex-shrink:0;user-select:none;gap:8px;color:var(--t2);
}
.sbl,.sbr{display:flex;align-items:center;gap:14px}
#st-mode{
  font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.07em;
  color:var(--ac);background:var(--at);padding:1px 9px;border-radius:20px;
}

/* ── Toast ─────────────────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:40px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--tx);color:var(--su);
  padding:8px 20px;border-radius:24px;
  font-size:12.5px;font-weight:600;opacity:0;
  transition:opacity .2s,transform .2s;
  pointer-events:none;z-index:1000;white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Focus mode ────────────────────────────────────────────────────────── */
body.focus #tb,
body.focus #ep,
body.focus #div,
body.focus #sb{display:none!important}
body.focus #main{height:100vh}
body.focus #rhd{display:none}

/* ── Responsive ────────────────────────────────────────────────────────── */
@media(max-width:600px){
  #main{flex-direction:column}
  #ep{flex:0 0 44%!important;min-height:0;border-right:none;border-bottom:1px solid var(--bd)}
  #rp{flex:1!important}
  #div{flex:0 0 4px!important;cursor:row-resize}
  .mdb{padding:20px 18px 60px}
}
</style>
</head>
<body>

</div>

<div id="main">
  <div id="ep">
    <div class="phd">
      Editor
      <small>Strg+Enter&nbsp;·&nbsp;Tab = Einrücken</small>

</div>

    <span id="st-mode">MERMAID</span>
  </div>
</div>

<div id="toast"></div>

<script>
(function(){
'use strict';

// ── Examples ──────────────────────────────────────────────────────────────────
const MM={
  flowchart:`flowchart TD
    Start([Start]) --> Login[Anmelden]
    Login --> Auth{Authentifiziert}
    Auth -- Ja --> Home[Dashboard]
    Auth -- Nein --> Err[Fehler anzeigen]
    Err --> Login
    Home --> Done([Fertig])`,

  sequence:`sequenceDiagram
    participant B as Browser
    participant S as Server
    participant D as Datenbank
    B->>S: GET /api/daten
    S->>D: SELECT * FROM items
    D-->>S: Ergebnisse
    S-->>B: JSON Response
    B->>B: UI aktualisieren`,

  class:`classDiagram
    class Tier {
        +String name
        +int alter
        +lautGeben() void
    }
    class Hund {
        +String rasse
        +apportieren() void
    }
    class Katze {
        +bool indoor
        +schnurren() void
    }
    Tier <|-- Hund
    Tier <|-- Katze`,

  state:`stateDiagram-v2
    [*] --> Bereit
    Bereit --> Laufend : Starten
    Laufend --> Erfolg : OK
    Laufend --> Fehler : Abbruch
    Erfolg --> Bereit : Reset
    Fehler --> Bereit : Wiederholen
    Fehler --> [*] : Beenden`,

  er:`erDiagram
    KUNDE ||--o{ BESTELLUNG : "gibt auf"
    KUNDE {
        int    id PK
        string name
        string email
    }
    BESTELLUNG ||--|{ POSITION : "enthaelt"
    BESTELLUNG {
        int    id PK
        date   datum
        string status
    }
    POSITION {
        int   id PK
        int   menge
        float preis
    }`,

  gantt:`gantt
    title Projektplan
    dateFormat  YYYY-MM-DD
    section Phase 1
    Konzept     :done,   2024-01-01, 7d
    Design      :active, 2024-01-08, 5d
    section Phase 2
    Entwicklung :        dev1, 2024-01-13, 10d
    Testing     :        2024-01-23, 5d
    section Phase 3
    Deployment  :        2024-01-28, 3d`,

  pie:`pie title Technologie-Stack
    "TypeScript" : 40
    "Python" : 25
    "Go" : 20
    "Rust" : 10
    "Sonstige" : 5`,

  git:`gitGraph
    commit id: "Initial"
    branch feature/auth
    checkout feature/auth
    commit id: "Login hinzufuegen"
    commit id: "Logout hinzufuegen"
    checkout main
    merge feature/auth
    branch hotfix
    checkout hotfix
    commit id: "Bug behoben"
    checkout main
    merge hotfix`,

  mindmap:`mindmap
  root((Mermaid))
    Diagramme
      Flowchart
      Sequence
      Class
    Features
      Live Preview
      Export
      Themes
    Export
      SVG
      PNG`,

  timeline:`timeline
    title Mermaid Geschichte
    2019 : Version 8
    2020 : ER-Diagramme
    2021 : GitGraph
    2022 : Mindmap
         : Timeline
    2023 : Version 10`
};

const MD_EXAMPLE=`# Projekt-Dokumentation

## Übersicht

Ein Beispieldokument mit **Markdown** und eingebetteten Mermaid-Diagrammen.
Wechsle den Modus oben, um zwischen Mermaid und Markdown zu editieren.

## Architektur

\`\`\`mermaid
flowchart LR
    Client --> API[REST API]
    API --> DB[(PostgreSQL)]
    API --> Cache[(Redis)]
    API --> Queue[Job Queue]

## Zeitplan

gantt
    title Roadmap Q2
    dateFormat  YYYY-MM-DD
    section MVP

    Entwicklung :active, 2024-04-15, 21d
    section Launch
    Testing     :        2024-05-06, 10d
    Release     :        2024-05-16, 3d
\`\`\`

## Feature-Status

> **Hinweis:** Termine sind Richtwerte und können sich verschieben.

## Code-Beispiel

// ── DOM ───────────────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const codeEl=$('code'), lnEl=$('ln'), mvEl=$('mv'), mdvEl=$('mdv'),
      mdbEl=$('mdb'), errEl=$('errbox'), emptyEl=$('empty'),
      dtEl=$('dtype'), zlblEl=$('zlbl'), epEl=$('ep'), rpEl=$('rp'),
      divEl=$('div'), zbarEl=$('zbar'), gmEl=$('gm'), gdEl=$('gd'),
      badgeEl=$('badge'), stCur=$('st-cur'), stCnt=$('st-cnt'),
      stInfo=$('st-info'), stMode=$('st-mode'), toastEl=$('toast');

// ── State ─────────────────────────────────────────────────────────────────────
let mode='mermaid', isDark, timer, zoom=1, px=0, py=0;
let pan=false, mx0,my0,px0,py0, rsz=false;
let mmId=0, mdId=0;

// ── Mode ──────────────────────────────────────────────────────────────────────
function setMode(m){
  mode=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.mode===m));
  const mm=m==='mermaid';
  gmEl.style.display=mm?'flex':'none';
  gdEl.style.display=mm?'none':'flex';
  mvEl.style.display=mm?'':'none';
  mdvEl.style.display=mm?'none':'';
  zbarEl.style.display=mm?'':'none';
  badgeEl.style.display=mm?'':'none';
  stMode.textContent=mm?'MERMAID':'MARKDOWN';
  localStorage.setItem('ds-mode',m);
  scheduleRender();
}

// ── Mermaid ───────────────────────────────────────────────────────────────────
function initMermaid(dark){
  mermaid.initialize({startOnLoad:false,theme:dark?'dark':'default',securityLevel:'loose'});
}

function scheduleRender(){
  clearTimeout(timer);
  timer=setTimeout(render,300);
}
async function render(){
  mode==='mermaid'?await renderMM():await renderMD();
}

async function renderMM(){
  const src=codeEl.value.trim();
  if(!src){
    mvEl.innerHTML='';mvEl.appendChild(emptyEl);
    errEl.style.display='none';dtEl.textContent='—';stInfo.textContent='';
    return;
  }
  localStorage.setItem('ds-mm',codeEl.value);
  const type=src.split(/[\s{([]/)[0].toLowerCase();
  dtEl.textContent=type||'—'; stInfo.textContent=type||'';
  const id='mg'+(++mmId);
  try{
    const{svg}=await mermaid.render(id,src);
    errEl.style.display='none';
    mvEl.innerHTML=svg;
    applyT();
  }catch(e){
    const msg=String(e.message||e).split('\n')[0].replace(/^\s*Error:\s*/i,'');
    errEl.textContent='⚠ '+msg;
    errEl.style.display='block';
    const stale=document.getElementById(id);
    if(stale)stale.remove();
  }
}

async function renderMD(){
  const src=codeEl.value;
  if(!src.trim()){
    mdbEl.innerHTML='<p style="color:var(--t3);text-align:center;padding:52px 0;font-size:14px">← Markdown eingeben</p>';
    return;
  }
  localStorage.setItem('ds-md',codeEl.value);
  mdbEl.innerHTML=marked.parse(src,{gfm:true,breaks:false});

  // render mermaid fences inside markdown
  for(const block of mdbEl.querySelectorAll('pre>code.language-mermaid')){
    const code=block.textContent.trim();
    const pre=block.parentElement;
    const wrap=document.createElement('div');
    wrap.className='mmw';
    pre.replaceWith(wrap);
    try{
      const id='mm'+(++mdId)+'_'+Date.now();
      const{svg}=await mermaid.render(id,code);
      wrap.innerHTML=svg;
    }catch(e){
      wrap.innerHTML='<div class="mme">⚠ '+esc(String(e.message||e).split('\n')[0])+'</div>';
    }
  }
  const words=src.trim().split(/\s+/).filter(Boolean).length;
  stInfo.textContent=words+' Wörter';
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── Zoom / Pan ────────────────────────────────────────────────────────────────
function applyT(){
  const svg=mvEl.querySelector('svg');
  if(!svg)return;
  svg.style.transformOrigin='0 0';
  svg.style.transform=`translate(${px}px,${py}px) scale(${zoom})`;
  zlblEl.textContent=Math.round(zoom*100)+'%';
}
function resetV(){zoom=1;px=0;py=0;applyT()}

mvEl.addEventListener('wheel',e=>{
  if(mode!=='mermaid')return;
  e.preventDefault();
  zoom=Math.max(.1,Math.min(10,zoom*(e.deltaY<0?1.12:.89)));
  applyT();
},{passive:false});

mvEl.addEventListener('mousedown',e=>{
  if(e.button||mode!=='mermaid')return;
  e.preventDefault();
  pan=true;mx0=e.clientX;my0=e.clientY;px0=px;py0=py;
  mvEl.classList.add('pan');
});

// ── Divider ───────────────────────────────────────────────────────────────────
divEl.addEventListener('mousedown',e=>{
  rsz=true;divEl.classList.add('drag');
  document.body.style.cursor='col-resize';
  document.body.style.userSelect='none';
  e.preventDefault();
});

document.addEventListener('mousemove',e=>{
  if(pan){px=px0+(e.clientX-mx0);py=py0+(e.clientY-my0);applyT()}
  if(rsz){
    const r=$('main').getBoundingClientRect();
    const p=Math.max(15,Math.min(85,(e.clientX-r.left)/r.width*100));
    epEl.style.flex=`0 0 ${p}%`;
    rpEl.style.flex=`0 0 ${100-p}%`;
  }
});
document.addEventListener('mouseup',()=>{
  if(pan){pan=false;mvEl.classList.remove('pan')}
  if(rsz){rsz=false;divEl.classList.remove('drag');document.body.style.cursor='';document.body.style.userSelect=''}
});

// ── Line numbers ──────────────────────────────────────────────────────────────
function updateLN(){
  const n=codeEl.value.split('\n').length, cur=lnEl.children.length;
  if(n===cur)return;
  if(n>cur){
    const f=document.createDocumentFragment();
    for(let i=cur+1;i<=n;i++){const s=document.createElement('span');s.textContent=i;f.appendChild(s)}
    lnEl.appendChild(f);
  }else while(lnEl.children.length>n)lnEl.lastChild.remove();
}
codeEl.addEventListener('scroll',()=>{lnEl.scrollTop=codeEl.scrollTop});

// ── Status ────────────────────────────────────────────────────────────────────
function updateSt(){
  const v=codeEl.value, b=v.slice(0,codeEl.selectionStart).split('\n');
  stCur.textContent=`Ln ${b.length}, Sp ${b[b.length-1].length+1}`;
  const lines=v.split('\n').length;
  stCnt.textContent=`${lines} ${lines===1?'Zeile':'Zeilen'} · ${v.length} Zeichen`;
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
codeEl.addEventListener('keydown',e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const s=codeEl.selectionStart,end=codeEl.selectionEnd;
    codeEl.value=codeEl.value.slice(0,s)+'  '+codeEl.value.slice(end);
    codeEl.selectionStart=codeEl.selectionEnd=s+2;
    updateLN();scheduleRender();
  }
  if(e.key==='Enter'&&e.ctrlKey){e.preventDefault();clearTimeout(timer);render()}
});
codeEl.addEventListener('input',()=>{updateLN();updateSt();scheduleRender()});
codeEl.addEventListener('keyup',updateSt);
codeEl.addEventListener('click',updateSt);
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.body.classList.remove('focus')});

// ── Theme ─────────────────────────────────────────────────────────────────────
function applyTheme(dark){
  isDark=dark;
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  $('b-theme').textContent=dark?'☀':'☾';
  localStorage.setItem('ds-theme',dark?'dark':'light');
  initMermaid(dark);
  render();
}

// ── URL sharing ───────────────────────────────────────────────────────────────
function toHash(m,c){
  try{return btoa(unescape(encodeURIComponent(JSON.stringify({m,c}))))}catch{return null}
}
function fromHash(h){
  try{return JSON.parse(decodeURIComponent(escape(atob(h))))}catch{return null}
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let ttmr;
function toast(msg){
  toastEl.textContent=msg;toastEl.classList.add('on');
  clearTimeout(ttmr);ttmr=setTimeout(()=>toastEl.classList.remove('on'),2400);
}

// ── Exports: Mermaid ──────────────────────────────────────────────────────────
function exportSVG(){
  const svg=mvEl.querySelector('svg');
  if(!svg)return toast('Kein Diagramm vorhanden.');
  dl(URL.createObjectURL(new Blob([svg.outerHTML],{type:'image/svg+xml'})),'diagram.svg');
}
function exportPNG(){
  const svg=mvEl.querySelector('svg');
  if(!svg)return toast('Kein Diagramm vorhanden.');
  const sc=2,vb=svg.viewBox.baseVal;
  const w=vb.width||svg.getBoundingClientRect().width||800;
  const h=vb.height||svg.getBoundingClientRect().height||600;
  const c=document.createElement('canvas');
  c.width=w*sc;c.height=h*sc;
  const ctx=c.getContext('2d');
  ctx.scale(sc,sc);
  ctx.fillStyle=isDark?'#09090e':'#ffffff';
  ctx.fillRect(0,0,w,h);
  const img=new Image();
  img.onload=()=>{ctx.drawImage(img,0,0);dl(c.toDataURL('image/png'),'diagram.png')};
  img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(new XMLSerializer().serializeToString(svg));
}
function copySVG(){
  const svg=mvEl.querySelector('svg');
  if(!svg)return toast('Kein Diagramm vorhanden.');
  navigator.clipboard.writeText(svg.outerHTML).then(()=>toast('SVG-Code kopiert ✓'));
}

// ── Exports: Markdown ─────────────────────────────────────────────────────────
function exportMD(){
  dl(URL.createObjectURL(new Blob([codeEl.value],{type:'text/markdown;charset=utf-8'})),'dokument.md');
}
function exportHTML(){
  const raw=codeEl.value.match(/^#+ (.+)/m);
  const title=raw?raw[1].replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])):'Dokument';
  const body=`<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>${title}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{padding:48px 24px 80px;background:#fff;color:#0d0d1a;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;font-size:15px;line-height:1.8}
.w{max-width:740px;margin:0 auto}
h1,h2,h3,h4{font-weight:700;line-height:1.3;margin:1.8em 0 .6em}
h1:first-child,h2:first-child{margin-top:0}
h1{font-size:1.9em;border-bottom:2px solid #e0e0ea;padding-bottom:.35em}
h2{font-size:1.45em;border-bottom:1px solid #e0e0ea;padding-bottom:.25em}
h3{font-size:1.18em}
p{margin:.9em 0}
a{color:#6366f1;text-decoration:none}
code{font-family:'Menlo',monospace;font-size:.85em;background:#f1f1f6;
  padding:.18em .48em;border-radius:5px;border:1px solid #e0e0ea}
pre{background:#f1f1f6;border:1px solid #e0e0ea;border-radius:10px;
  padding:16px 20px;overflow-x:auto;margin:1.4em 0}
pre code{background:none;border:none;padding:0;font-size:.875em}
blockquote{border-left:3px solid #6366f1;margin:1.4em 0;padding:.7em 1.4em;
  background:rgba(99,102,241,.08);border-radius:0 10px 10px 0}
blockquote p{margin:0;color:#64647a}
table{border-collapse:collapse;width:100%;margin:1.4em 0}
th,td{border:1px solid #e0e0ea;padding:9px 14px;text-align:left}
th{background:#f1f1f6;font-weight:600}
tr:nth-child(even) td{background:#f7f7fb}
ul,ol{margin:.8em 0;padding-left:1.8em}
li{margin:.4em 0}
hr{border:none;border-top:1px solid #e0e0ea;margin:2.5em 0}
img{max-width:100%;border-radius:10px}
.mmw{display:flex;justify-content:center;margin:1.6em 0;padding:20px;
  border:1px solid #e0e0ea;border-radius:10px;overflow-x:auto}
.mmw svg{max-width:100%}
</style></head><body><div class="w">${mdbEl.innerHTML}</div></body></html>`;
  dl(URL.createObjectURL(new Blob([body],{type:'text/html;charset=utf-8'})),'dokument.html');
}
function copyHTML(){
  navigator.clipboard.writeText(mdbEl.innerHTML).then(()=>toast('HTML kopiert ✓'));
}
function dl(url,name){const a=document.createElement('a');a.href=url;a.download=name;a.click()}

// ── Wiring ────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab=>tab.addEventListener('click',()=>{
  const next=tab.dataset.mode;
  if(next===mode)return;
  localStorage.setItem('ds-'+mode,codeEl.value);
  const saved=localStorage.getItem('ds-'+next);
  codeEl.value=saved!==null?saved:(next==='markdown'?MD_EXAMPLE:MM.flowchart);
  updateLN();updateSt();setMode(next);
}));

$('b-theme').addEventListener('click',()=>applyTheme(!isDark));
$('b-svg').addEventListener('click',exportSVG);
$('b-png').addEventListener('click',exportPNG);
$('b-csvg').addEventListener('click',copySVG);
$('b-md').addEventListener('click',exportMD);
$('b-html').addEventListener('click',exportHTML);
$('b-cht').addEventListener('click',copyHTML);
$('b-zi').addEventListener('click',()=>{zoom=Math.min(10,zoom*1.25);applyT()});
$('b-zo').addEventListener('click',()=>{zoom=Math.max(.1,zoom/1.25);applyT()});
$('b-zr').addEventListener('click',resetV);
$('b-focus').addEventListener('click',()=>document.body.classList.toggle('focus'));
$('b-share').addEventListener('click',()=>{
  const h=toHash(mode,codeEl.value);
  if(!h)return toast('Fehler beim Erstellen des Links.');
  history.replaceState(null,'',location.pathname+'#'+h);
  navigator.clipboard.writeText(location.href).then(()=>toast('Link kopiert ✓'));
});
$('sel').addEventListener('change',function(){
  const c=MM[this.value];
  if(c){codeEl.value=c;updateLN();updateSt();scheduleRender()}
  this.value='';
});

// ── Boot ──────────────────────────────────────────────────────────────────────
const savedTheme=localStorage.getItem('ds-theme');
isDark=savedTheme?savedTheme==='dark':window.matchMedia('(prefers-color-scheme: dark)').matches;
document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
$('b-theme').textContent=isDark?'☀':'☾';
initMermaid(isDark);

const hash=location.hash.slice(1);
if(hash){
  const d=fromHash(hash);
  if(d&&d.c!==undefined){codeEl.value=d.c;updateLN();updateSt();setMode(d.m||'mermaid')}
  else boot();
}else boot();

function boot(){
  const m=localStorage.getItem('ds-mode')||'mermaid';
  const s=localStorage.getItem('ds-'+m);
  codeEl.value=s!==null?s:(m==='markdown'?MD_EXAMPLE:MM.flowchart);
  updateLN();updateSt();setMode(m);
}

})();
</script>
</body>
</html>
