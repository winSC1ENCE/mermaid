<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mermaid Editor</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f0f0f5;
  --surface:   #ffffff;
  --surface2:  #e8e8f0;
  --border:    #c8c8d0;
  --text:      #111114;
  --text2:     #666672;
  --accent:    #0071e3;
  --err-bg:    #fff0f0;
  --err-fg:    #c00020;
  --shadow:    0 1px 4px rgba(0,0,0,.12);
  --ln-bg:     #f4f4f8;
  --ln-fg:     #aaaabc;
  --editor-bg: #ffffff;
  --editor-fg: #111114;
}
[data-theme=dark] {
  --bg:        #1a1a1f;
  --surface:   #26262e;
  --surface2:  #32323c;
  --border:    #44444e;
  --text:      #e8e8f2;
  --text2:     #9090a4;
  --accent:    #4da3ff;
  --err-bg:    #2c1414;
  --err-fg:    #ff7070;
  --shadow:    0 1px 4px rgba(0,0,0,.4);
  --ln-bg:     #22222a;
  --ln-fg:     #55556a;
  --editor-bg: #1e1e26;
  --editor-fg: #d4d4e8;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }

/* ── Toolbar ── */
#toolbar {
  height: 46px; display: flex; align-items: center; gap: 5px;
  padding: 0 10px; background: var(--surface); border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow); flex-shrink: 0; overflow-x: auto; overflow-y: hidden;
}
.logo { font-weight: 700; font-size: 15px; color: var(--accent); white-space: nowrap; margin-right: 4px; }
.sep  { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; margin: 0 2px; }

button, select {
  font: inherit; font-size: 13px; cursor: pointer;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface); color: var(--text);
  padding: 4px 9px; white-space: nowrap; flex-shrink: 0;
  transition: background .12s, border-color .12s;
}
button:hover { background: var(--surface2); border-color: var(--accent); }
select { max-width: 140px; }

#diagram-badge { margin-left: auto; display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text2); white-space: nowrap; flex-shrink: 0; }
#diagram-type { font-weight: 700; color: var(--accent);
  background: var(--surface2); padding: 2px 8px; border-radius: 10px; }

/* ── Layout ── */
#main {
  display: flex; height: calc(100vh - 46px); overflow: hidden;
}

/* ── Editor pane ── */
#editor-pane {
  flex: 0 0 42%; min-width: 150px; display: flex; flex-direction: column;
  background: var(--surface); overflow: hidden;
}
.pane-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 10px; background: var(--surface2); border-bottom: 1px solid var(--border);
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .07em; color: var(--text2); flex-shrink: 0;
}
.pane-hd small { font-weight: 400; font-size: 11px; }

/* line-numbers + textarea wrapper */
#editor-wrap {
  flex: 1; display: flex; overflow: hidden; position: relative;
  background: var(--editor-bg);
}
#line-nums {
  width: 38px; flex-shrink: 0; padding: 10px 0;
  background: var(--ln-bg); border-right: 1px solid var(--border);
  overflow: hidden; user-select: none; text-align: right;
  font: 13px/1.55 'Menlo','Consolas','Monaco',monospace;
  color: var(--ln-fg); pointer-events: none;
}
#line-nums span { display: block; padding-right: 7px; }

#code {
  flex: 1; resize: none; border: none; outline: none;
  padding: 10px 10px 10px 10px;
  font: 13px/1.55 'Menlo','Consolas','Monaco',monospace;
  background: var(--editor-bg); color: var(--editor-fg);
  tab-size: 2; white-space: pre; overflow: auto;
}

/* ── Divider ── */
#divider {
  flex: 0 0 5px; cursor: col-resize; background: var(--border);
  display: flex; align-items: center; justify-content: center;
  transition: background .15s; flex-shrink: 0; z-index: 2;
}
#divider:hover { background: var(--accent); }
#divider::after { content: '⋮'; font-size: 13px; color: var(--text2); pointer-events: none; }

/* ── Preview pane ── */
#preview-pane {
  flex: 1; min-width: 150px; display: flex; flex-direction: column;
  background: var(--bg); overflow: hidden;
}
#zoom-bar { display: flex; align-items: center; gap: 3px; }
#zoom-bar button { padding: 2px 8px; font-size: 14px; }
#zoom-lbl { font-size: 11px; color: var(--text2); min-width: 38px; text-align: center; font-weight: 400; }

#error-box {
  display: none; margin: 8px 10px; padding: 9px 12px; flex-shrink: 0;
  background: var(--err-bg); color: var(--err-fg);
  border: 1px solid currentColor; border-radius: 7px;
  font: 12px/1.5 'Menlo','Consolas',monospace;
  white-space: pre-wrap; word-break: break-word;
}

#preview {
  flex: 1; overflow: hidden; padding: 20px;
  cursor: grab; position: relative;
}
#preview.panning { cursor: grabbing; }
#preview svg { max-width: none; display: block;
  filter: drop-shadow(0 2px 10px rgba(0,0,0,.12)); }
#preview-empty {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; color: var(--text2); font-size: 13px;
  pointer-events: none;
}

@media (max-width: 600px) {
  #main { flex-direction: column; }
  #editor-pane, #preview-pane { flex: 0 0 50% !important; min-height: 0; }
  #divider { flex: 0 0 4px; cursor: row-resize; }
}
</style>
</head>
<body>

<div id="toolbar">
  <span class="logo">⬡ Mermaid Editor</span>
  <div class="sep"></div>

  <select id="sel-example">
    <option value="">Beispiele ▾</option>
    <option value="flowchart">Flowchart</option>
    <option value="sequence">Sequence</option>
    <option value="class">Class</option>
    <option value="state">State</option>
    <option value="er">ER-Diagramm</option>
    <option value="gantt">Gantt</option>
    <option value="pie">Pie Chart</option>
    <option value="git">Git Graph</option>
    <option value="mindmap">Mindmap</option>
    <option value="timeline">Timeline</option>
  </select>

  <div class="sep"></div>
  <button id="btn-svg">↓ SVG</button>
  <button id="btn-png">↓ PNG</button>
  <div class="sep"></div>
  <button id="btn-theme">☾ Dunkel</button>

  <div id="diagram-badge">Typ: <span id="diagram-type">—</span></div>
</div>

<div id="main">
  <div id="editor-pane">
    <div class="pane-hd">Editor <small>Strg+Enter = Rendern&nbsp;&nbsp;Tab = Einrücken</small></div>
    <div id="editor-wrap">
      <div id="line-nums"></div>
      <textarea id="code" spellcheck="false" autocorrect="off" autocomplete="off"></textarea>
    </div>
  </div>

  <div id="divider"></div>

  <div id="preview-pane">
    <div class="pane-hd">
      Vorschau
      <div id="zoom-bar">
        <button id="btn-zout">−</button>
        <span id="zoom-lbl">100%</span>
        <button id="btn-zin">+</button>
        <button id="btn-zreset">↺</button>
      </div>
    </div>
    <div id="error-box"></div>
    <div id="preview">
      <div id="preview-empty">← Code eingeben, Vorschau erscheint automatisch</div>
    </div>
  </div>
</div>

<script>
(function () {
'use strict';

// ── Examples ──────────────────────────────────────────────────────────────────
const EXAMPLES = {
  flowchart: `flowchart LR
    A[Start] --> B{Entscheidung?}
    B -->|Ja| C[Aktion A]
    B -->|Nein| D[Aktion B]
    C --> E[Ende]
    D --> E`,

  sequence: `sequenceDiagram
    participant Browser
    participant Server
    participant DB
    Browser->>Server: GET /api/data
    Server->>DB: SELECT * FROM items
    DB-->>Server: Ergebnisse
    Server-->>Browser: JSON Response
    Browser->>Browser: UI aktualisieren`,

  class: `classDiagram
    class Animal {
      +String name
      +int age
      +makeSound() void
    }
    class Dog {
      +String breed
      +fetch() void
    }
    class Cat {
      +bool isIndoor
      +purr() void
    }
    Animal <|-- Dog
    Animal <|-- Cat`,

  state: `stateDiagram-v2
    [*] --> Idle
    Idle --> Processing : Start
    Processing --> Success : OK
    Processing --> Error : Fehler
    Success --> Idle : Reset
    Error --> Idle : Retry
    Error --> [*] : Abbrechen`,

  er: `erDiagram
    CUSTOMER ||--o{ ORDER : places
    CUSTOMER {
        int id PK
        string name
        string email
    }
    ORDER ||--|{ LINE_ITEM : contains
    ORDER {
        int id PK
        date created_at
        string status
    }
    LINE_ITEM {
        int id PK
        int quantity
        float price
    }`,

  gantt: `gantt
    title Projektplan
    dateFormat  YYYY-MM-DD
    section Phase 1
    Konzept     :done,   des1, 2024-01-01, 7d
    Design      :active, des2, 2024-01-08, 5d
    section Phase 2
    Entwicklung :        dev1, 2024-01-13, 10d
    Testing     :        test1, after dev1, 5d
    section Phase 3
    Deployment  :        dep1, after test1, 3d`,

  pie: `pie title Technologie-Stack
    "TypeScript" : 40
    "Python" : 25
    "Go" : 20
    "Rust" : 10
    "Sonstige" : 5`,

  git: `gitGraph
    commit id: "Initial"
    branch feature/auth
    checkout feature/auth
    commit id: "Add login"
    commit id: "Add logout"
    checkout main
    merge feature/auth
    branch hotfix
    checkout hotfix
    commit id: "Fix bug"
    checkout main
    merge hotfix`,

  mindmap: `mindmap
  root((Mermaid))
    Diagramme
      Flowchart
      Sequence
      Class
    Features
      Live Preview
      Export
      Themes
    Export
      SVG
      PNG`,

  timeline: `timeline
    title Entwicklungsgeschichte
    2019 : Mermaid 8.0
    2020 : ER-Diagramme
    2021 : GitGraph
    2022 : Mindmap
         : Timeline
    2023 : Mermaid 10.0`
};

// ── State ─────────────────────────────────────────────────────────────────────
let isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
let renderTimer = null;
let zoom = 1, px = 0, py = 0;
let panning = false, mx0 = 0, my0 = 0, px0 = 0, py0 = 0;
let resizing = false;

// ── DOM refs ──────────────────────────────────────────────────────────────────
const codeEl    = document.getElementById('code');
const lineNums  = document.getElementById('line-nums');
const preview   = document.getElementById('preview');
const errorBox  = document.getElementById('error-box');
const emptyMsg  = document.getElementById('preview-empty');
const typeEl    = document.getElementById('diagram-type');
const zoomLbl   = document.getElementById('zoom-lbl');
const editorPane  = document.getElementById('editor-pane');
const previewPane = document.getElementById('preview-pane');

// ── Mermaid init ──────────────────────────────────────────────────────────────
function initMermaid(dark) {
  mermaid.initialize({
    startOnLoad: false,
    theme: dark ? 'dark' : 'default',
    securityLevel: 'loose',
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function scheduleRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(render, 300);
}

let renderId = 0;
async function render() {
  const code = codeEl.value.trim();
  if (!code) {
    preview.innerHTML = '';
    preview.appendChild(emptyMsg);
    errorBox.style.display = 'none';
    typeEl.textContent = '—';
    return;
  }
  localStorage.setItem('mermaid-code', codeEl.value);
  typeEl.textContent = detectType(code) || '—';

  const id = 'mg' + (++renderId);
  try {
    const { svg } = await mermaid.render(id, code);
    errorBox.style.display = 'none';
    preview.innerHTML = svg;
    applyTransform();
  } catch (e) {
    const msg = String(e.message || e).split('\n')[0].replace(/^\s*Error:\s*/i, '');
    errorBox.textContent = '⚠ ' + msg;
    errorBox.style.display = 'block';
    // clean up orphaned element mermaid may have appended to body
    const leftover = document.getElementById(id);
    if (leftover) leftover.remove();
  }
}

function detectType(code) {
  const w = code.split(/\s/)[0].toLowerCase();
  return w || null;
}

// ── Zoom / Pan ────────────────────────────────────────────────────────────────
function applyTransform() {
  const svg = preview.querySelector('svg');
  if (!svg) return;
  svg.style.transformOrigin = '0 0';
  svg.style.transform = `translate(${px}px,${py}px) scale(${zoom})`;
  zoomLbl.textContent = Math.round(zoom * 100) + '%';
}

function resetView() { zoom = 1; px = 0; py = 0; applyTransform(); }

preview.addEventListener('wheel', e => {
  e.preventDefault();
  zoom = Math.max(0.1, Math.min(10, zoom * (e.deltaY < 0 ? 1.12 : 0.89)));
  applyTransform();
}, { passive: false });

preview.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  e.preventDefault();
  panning = true; mx0 = e.clientX; my0 = e.clientY; px0 = px; py0 = py;
  preview.classList.add('panning');
});
document.addEventListener('mousemove', e => {
  if (!panning) return;
  px = px0 + (e.clientX - mx0);
  py = py0 + (e.clientY - my0);
  applyTransform();
});
document.addEventListener('mouseup', () => {
  if (!panning) return;
  panning = false;
  preview.classList.remove('panning');
});

// ── Split pane drag ───────────────────────────────────────────────────────────
const divider = document.getElementById('divider');
const mainEl  = document.getElementById('main');

divider.addEventListener('mousedown', e => {
  resizing = true;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!resizing) return;
  const r = mainEl.getBoundingClientRect();
  const pct = Math.max(15, Math.min(85, (e.clientX - r.left) / r.width * 100));
  editorPane.style.flex  = `0 0 ${pct}%`;
  previewPane.style.flex = `0 0 ${100 - pct}%`;
});
document.addEventListener('mouseup', () => {
  if (!resizing) return;
  resizing = false;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});

// ── Line numbers ──────────────────────────────────────────────────────────────
function updateLineNums() {
  const count = codeEl.value.split('\n').length;
  const current = lineNums.children.length;
  if (count === current) return;
  if (count > current) {
    const frag = document.createDocumentFragment();
    for (let i = current + 1; i <= count; i++) {
      const s = document.createElement('span');
      s.textContent = i;
      frag.appendChild(s);
    }
    lineNums.appendChild(frag);
  } else {
    while (lineNums.children.length > count) lineNums.lastChild.remove();
  }
}

// Sync scroll between line-nums and textarea
codeEl.addEventListener('scroll', () => {
  lineNums.scrollTop = codeEl.scrollTop;
});

// ── Tab key support ───────────────────────────────────────────────────────────
codeEl.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = codeEl.selectionStart, end = codeEl.selectionEnd;
    codeEl.value = codeEl.value.slice(0, s) + '  ' + codeEl.value.slice(end);
    codeEl.selectionStart = codeEl.selectionEnd = s + 2;
    updateLineNums();
    scheduleRender();
  }
  if (e.key === 'Enter' && e.ctrlKey) {
    e.preventDefault();
    clearTimeout(renderTimer);
    render();
  }
});

codeEl.addEventListener('input', () => {
  updateLineNums();
  scheduleRender();
});

// ── Theme ─────────────────────────────────────────────────────────────────────
function applyTheme(dark) {
  isDark = dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('btn-theme').textContent = dark ? '☀ Hell' : '☾ Dunkel';
  initMermaid(dark);
  render();
}

// ── Export ────────────────────────────────────────────────────────────────────
function exportSVG() {
  const svg = preview.querySelector('svg');
  if (!svg) return alert('Kein Diagramm vorhanden.');
  const blob = new Blob([svg.outerHTML], { type: 'image/svg+xml' });
  dl(URL.createObjectURL(blob), 'diagram.svg');
}

function exportPNG() {
  const svg = preview.querySelector('svg');
  if (!svg) return alert('Kein Diagramm vorhanden.');
  const scale = 2;
  const vb = svg.viewBox.baseVal;
  const w = vb.width  || svg.getBoundingClientRect().width  || 800;
  const h = vb.height || svg.getBoundingClientRect().height || 600;
  const canvas = document.createElement('canvas');
  canvas.width = w * scale; canvas.height = h * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);
  ctx.fillStyle = isDark ? '#1a1a1f' : '#ffffff';
  ctx.fillRect(0, 0, w, h);
  const img = new Image();
  img.onload = () => { ctx.drawImage(img, 0, 0); dl(canvas.toDataURL('image/png'), 'diagram.png'); };
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(new XMLSerializer().serializeToString(svg));
}

function dl(url, name) {
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
}

// ── Wiring ────────────────────────────────────────────────────────────────────
document.getElementById('btn-theme') .addEventListener('click', () => applyTheme(!isDark));
document.getElementById('btn-svg')   .addEventListener('click', exportSVG);
document.getElementById('btn-png')   .addEventListener('click', exportPNG);
document.getElementById('btn-zin')   .addEventListener('click', () => { zoom = Math.min(10, zoom * 1.25); applyTransform(); });
document.getElementById('btn-zout')  .addEventListener('click', () => { zoom = Math.max(0.1, zoom / 1.25); applyTransform(); });
document.getElementById('btn-zreset').addEventListener('click', resetView);
document.getElementById('sel-example').addEventListener('change', function () {
  const code = EXAMPLES[this.value];
  if (code) { codeEl.value = code; updateLineNums(); scheduleRender(); }
  this.value = '';
});

// ── Boot ──────────────────────────────────────────────────────────────────────
initMermaid(isDark);
document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
document.getElementById('btn-theme').textContent = isDark ? '☀ Hell' : '☾ Dunkel';

codeEl.value = localStorage.getItem('mermaid-code') || EXAMPLES.flowchart;
updateLineNums();
render();

})();
</script>
</body>
</html>
