<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mermaid Editor</title>

<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

<script type="module">
import { basicSetup } from 'https://esm.sh/codemirror@6';
import { EditorView, keymap } from 'https://esm.sh/@codemirror/view@6';
import { EditorState } from 'https://esm.sh/@codemirror/state@6';
import { defaultKeymap } from 'https://esm.sh/@codemirror/commands@6';
import { oneDark } from 'https://esm.sh/@codemirror/theme-one-dark@6';
import { StreamLanguage } from 'https://esm.sh/@codemirror/language@6';

const mermaidLang = StreamLanguage.define({
  name: 'mermaid',
  token(stream) {
    if (stream.match(/%%.*$/)) { stream.skipToEnd(); return 'comment'; }
    if (stream.match(/^(flowchart|graph|sequenceDiagram|classDiagram|stateDiagram-v2|stateDiagram|erDiagram|gantt|pie|journey|gitGraph|mindmap|timeline|quadrantChart|xychart-beta|requirementDiagram)\b/))
      return 'keyword';
    if (stream.match(/\b(subgraph|end|participant|actor|activate|deactivate|note|loop|alt|else|opt|par|rect|autonumber|class|state|section|title|dateFormat|axisFormat|LR|RL|TB|BT|TD|direction|style|classDef|linkStyle|click)\b/))
      return 'keyword';
    if (stream.match(/-->|==>|\.->|===>|o--o|x--x|<-->|-->/)) return 'operator';
    if (stream.match(/"[^"]*"/)) return 'string';
    if (stream.match(/'[^']*'/)) return 'string';
    if (stream.match(/\d+/)) return 'number';
    stream.next();
    return null;
  }
});

const EXAMPLES = {
  flowchart: `flowchart LR
    A[Start] --> B{Entscheidung?}
    B -->|Ja| C[Aktion A]
    B -->|Nein| D[Aktion B]
    C --> E[Ende]
    D --> E`,

  sequence: `sequenceDiagram
    participant Browser
    participant Server
    participant DB
    Browser->>Server: GET /api/data
    Server->>DB: SELECT * FROM items
    DB-->>Server: Ergebnisse
    Server-->>Browser: JSON Response
    Browser->>Browser: UI aktualisieren`,

  class: `classDiagram
    class Animal {
      +String name
      +int age
      +makeSound() void
    }
    class Dog {
      +String breed
      +fetch() void
    }
    class Cat {
      +bool isIndoor
      +purr() void
    }
    Animal <|-- Dog
    Animal <|-- Cat`,

  state: `stateDiagram-v2
    [*] --> Idle
    Idle --> Processing : Start
    Processing --> Success : OK
    Processing --> Error : Fehler
    Success --> Idle : Reset
    Error --> Idle : Retry
    Error --> [*] : Abbrechen`,

  er: `erDiagram
    CUSTOMER ||--o{ ORDER : places
    CUSTOMER {
        int id PK
        string name
        string email
    }
    ORDER ||--|{ LINE_ITEM : contains
    ORDER {
        int id PK
        date created_at
        string status
    }
    LINE_ITEM {
        int id PK
        int quantity
        float price
    }`,

  gantt: `gantt
    title Projektplan
    dateFormat  YYYY-MM-DD
    section Phase 1
    Konzept     :done,   des1, 2024-01-01, 7d
    Design      :active, des2, 2024-01-08, 5d
    section Phase 2
    Entwicklung :        dev1, 2024-01-13, 10d
    Testing     :        test1, after dev1, 5d
    section Phase 3
    Deployment  :        dep1, after test1, 3d`,

  pie: `pie title Technologie-Stack
    "TypeScript" : 40
    "Python" : 25
    "Go" : 20
    "Rust" : 10
    "Sonstige" : 5`,

  git: `gitGraph
    commit id: "Initial"
    branch feature/auth
    checkout feature/auth
    commit id: "Add login"
    commit id: "Add logout"
    checkout main
    merge feature/auth
    branch hotfix
    checkout hotfix
    commit id: "Fix bug"
    checkout main
    merge hotfix`,

  mindmap: `mindmap
  root((Mermaid))
    Diagramme
      Flowchart
      Sequence
      Class
      State
    Features
      Live Preview
      Export
      Themes
    Export
      SVG
      PNG`,

  timeline: `timeline
    title Entwicklungsgeschichte
    2019 : Mermaid 8.0
    2020 : ER-Diagramme
         : Gantt verbessert
    2021 : GitGraph
    2022 : Mindmap
         : Timeline
    2023 : Mermaid 10.0
         : ESM Support`
};

let editorView = null;
let isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
let renderTimeout = null;
let zoomLevel = 1;
let panX = 0, panY = 0;
let isPanning = false, panStartX = 0, panStartY = 0, panStartPanX = 0, panStartPanY = 0;
let isResizing = false;

// ─── Editor ──────────────────────────────────────────────────────────────────

function createEditor(content, dark) {
  const extensions = [
    basicSetup,
    mermaidLang,
    keymap.of([
      ...defaultKeymap,
      { key: 'Ctrl-Enter', run: () => { renderDiagram(); return true; } }
    ]),
    EditorView.updateListener.of(update => {
      if (update.docChanged) scheduleRender();
    }),
    EditorView.lineWrapping,
  ];
  if (dark) extensions.push(oneDark);

  return new EditorView({
    state: EditorState.create({ doc: content, extensions }),
    parent: document.getElementById('editor-container')
  });
}

function getCode() {
  return editorView ? editorView.state.doc.toString() : '';
}

// ─── Render ───────────────────────────────────────────────────────────────────

function scheduleRender() {
  clearTimeout(renderTimeout);
  renderTimeout = setTimeout(renderDiagram, 300);
}

async function renderDiagram() {
  const code = getCode();
  const preview = document.getElementById('preview');
  const errorBox = document.getElementById('error-box');
  const diagramType = document.getElementById('diagram-type');

  if (code.trim()) localStorage.setItem('mermaid-code', code);

  diagramType.textContent = detectDiagramType(code) || '—';

  try {
    errorBox.style.display = 'none';
    preview.innerHTML = '';
    const id = 'mg-' + Date.now();
    const { svg } = await mermaid.render(id, code);
    preview.innerHTML = svg;
    applyTransform();
  } catch (e) {
    const msg = (e.message || String(e)).replace(/\n.*$/s, '').trim();
    errorBox.textContent = '⚠ ' + msg;
    errorBox.style.display = 'block';
  }
}

function detectDiagramType(code) {
  const first = code.trim().split('\n')[0].trim().toLowerCase();
  const types = ['flowchart','graph','sequencediagram','classdiagram','statediagram',
    'erdiagram','gantt','pie','journey','gitgraph','mindmap','timeline',
    'quadrantchart','xychart','requirementdiagram'];
  for (const t of types) {
    if (first.startsWith(t)) return first.split(/\s/)[0];
  }
  return null;
}

// ─── Zoom / Pan ───────────────────────────────────────────────────────────────

function applyTransform() {
  const svg = document.querySelector('#preview svg');
  if (!svg) return;
  svg.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
  svg.style.transformOrigin = 'top left';
  document.getElementById('zoom-label').textContent = Math.round(zoomLevel * 100) + '%';
}

function resetView() {
  zoomLevel = 1; panX = 0; panY = 0;
  applyTransform();
}

function initPanZoom() {
  const preview = document.getElementById('preview');

  preview.style.cursor = 'grab';

  preview.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY > 0 ? 0.9 : 1.1;
    zoomLevel = Math.max(0.1, Math.min(10, zoomLevel * factor));
    applyTransform();
  }, { passive: false });

  preview.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    e.preventDefault();
    isPanning = true;
    panStartX = e.clientX;
    panStartY = e.clientY;
    panStartPanX = panX;
    panStartPanY = panY;
    preview.style.cursor = 'grabbing';
  });

  document.addEventListener('mousemove', e => {
    if (!isPanning) return;
    panX = panStartPanX + (e.clientX - panStartX);
    panY = panStartPanY + (e.clientY - panStartY);
    applyTransform();
  });

  document.addEventListener('mouseup', () => {
    if (!isPanning) return;
    isPanning = false;
    document.getElementById('preview').style.cursor = 'grab';
  });
}

// ─── Split pane ───────────────────────────────────────────────────────────────

function initSplitPane() {
  const divider = document.getElementById('divider');
  const container = document.getElementById('main-container');
  const editorPane = document.getElementById('editor-pane');
  const previewPane = document.getElementById('preview-pane');

  divider.addEventListener('mousedown', e => {
    isResizing = true;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!isResizing) return;
    const rect = container.getBoundingClientRect();
    const pct = Math.max(20, Math.min(80,
      ((e.clientX - rect.left) / rect.width) * 100
    ));
    editorPane.style.flex = `0 0 ${pct}%`;
    previewPane.style.flex = `0 0 ${100 - pct}%`;
  });

  document.addEventListener('mouseup', () => {
    if (!isResizing) return;
    isResizing = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
}

// ─── Export ───────────────────────────────────────────────────────────────────

function exportSVG() {
  const svg = document.querySelector('#preview svg');
  if (!svg) return alert('Kein Diagramm zum Exportieren.');
  const blob = new Blob([svg.outerHTML], { type: 'image/svg+xml' });
  triggerDownload(URL.createObjectURL(blob), 'diagram.svg');
}

function exportPNG() {
  const svg = document.querySelector('#preview svg');
  if (!svg) return alert('Kein Diagramm zum Exportieren.');
  const scale = 2;
  const vb = svg.viewBox.baseVal;
  const w = vb.width || svg.clientWidth || 800;
  const h = vb.height || svg.clientHeight || 600;
  const canvas = document.createElement('canvas');
  canvas.width = w * scale;
  canvas.height = h * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);
  ctx.fillStyle = isDark ? '#1c1c1e' : '#ffffff';
  ctx.fillRect(0, 0, w, h);
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0);
    triggerDownload(canvas.toDataURL('image/png'), 'diagram.png');
  };
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(new XMLSerializer().serializeToString(svg));
}

function triggerDownload(url, name) {
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
}

// ─── Theme ────────────────────────────────────────────────────────────────────

function applyThemeDOM(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = dark ? '☀ Hell' : '☾ Dunkel';
}

function setTheme(dark) {
  isDark = dark;
  applyThemeDOM(dark);
  mermaid.initialize({ startOnLoad: false, theme: dark ? 'dark' : 'default', securityLevel: 'loose' });
  if (!editorView) return;
  const code = getCode();
  editorView.destroy();
  document.getElementById('editor-container').innerHTML = '';
  editorView = createEditor(code, dark);
  renderDiagram();
}

// ─── Examples ─────────────────────────────────────────────────────────────────

function loadExample(name) {
  const code = EXAMPLES[name];
  if (!code || !editorView) return;
  editorView.dispatch({
    changes: { from: 0, to: editorView.state.doc.length, insert: code }
  });
  document.getElementById('examples-dropdown').value = '';
}

// ─── Init ─────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  // 1. Apply theme visuals (no editor exists yet)
  applyThemeDOM(isDark);
  mermaid.initialize({ startOnLoad: false, theme: isDark ? 'dark' : 'default', securityLevel: 'loose' });

  // 2. Create editor
  const saved = localStorage.getItem('mermaid-code') || EXAMPLES.flowchart;
  editorView = createEditor(saved, isDark);

  // 3. Wire up controls
  document.getElementById('theme-btn').addEventListener('click', () => setTheme(!isDark));
  document.getElementById('export-svg').addEventListener('click', exportSVG);
  document.getElementById('export-png').addEventListener('click', exportPNG);
  document.getElementById('reset-view').addEventListener('click', resetView);
  document.getElementById('zoom-in').addEventListener('click', () => {
    zoomLevel = Math.min(10, zoomLevel * 1.25); applyTransform();
  });
  document.getElementById('zoom-out').addEventListener('click', () => {
    zoomLevel = Math.max(0.1, zoomLevel / 1.25); applyTransform();
  });
  document.getElementById('examples-dropdown').addEventListener('change', e => {
    loadExample(e.target.value);
  });

  initSplitPane();
  initPanZoom();
  renderDiagram();
});
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface2: #ebebf0;
    --border: #d1d1d6;
    --text: #1c1c1e;
    --text2: #636366;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --error-bg: #fff0f0;
    --error-text: #c00;
    --shadow: 0 1px 3px rgba(0,0,0,0.12);
    --divider-color: #c7c7cc;
  }

  [data-theme="dark"] {
    --bg: #1c1c1e;
    --surface: #2c2c2e;
    --surface2: #3a3a3c;
    --border: #48484a;
    --text: #f2f2f7;
    --text2: #aeaeb2;
    --accent: #0a84ff;
    --accent-hover: #409cff;
    --error-bg: #2c1515;
    --error-text: #ff6b6b;
    --shadow: 0 1px 3px rgba(0,0,0,0.4);
    --divider-color: #636366;
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* ── Toolbar ── */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 12px;
    height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow);
    z-index: 10;
    flex-shrink: 0;
  }

  .logo {
    font-weight: 700;
    font-size: 15px;
    color: var(--accent);
    white-space: nowrap;
    margin-right: 4px;
  }

  .sep {
    width: 1px;
    height: 22px;
    background: var(--border);
    margin: 0 2px;
    flex-shrink: 0;
  }

  button, select {
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    padding: 5px 10px;
    transition: background 0.12s, border-color 0.12s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  button:hover { background: var(--surface2); border-color: var(--accent); }
  select:hover { background: var(--surface2); }

  #diagram-badge {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
  }
  #diagram-type {
    font-weight: 600;
    color: var(--accent);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 12px;
  }

  /* ── Layout ── */
  #main-container {
    display: flex;
    height: calc(100vh - 48px);
    overflow: hidden;
  }

  /* ── Editor pane ── */
  #editor-pane {
    flex: 0 0 45%;
    min-width: 0;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  .pane-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 12px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text2);
    flex-shrink: 0;
  }
  .pane-header span { font-weight: 400; }

  #editor-container {
    flex: 1;
    overflow: hidden;
    font-size: 13px;
  }
  .cm-editor { height: 100% !important; }
  .cm-editor .cm-scroller {
    overflow: auto !important;
    font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
    font-size: 13px;
  }

  /* ── Divider ── */
  #divider {
    flex: 0 0 6px;
    cursor: col-resize;
    background: var(--border);
    position: relative;
    z-index: 2;
    transition: background 0.15s;
  }
  #divider:hover { background: var(--accent); }
  #divider::after {
    content: '⋮';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--text2);
    font-size: 14px;
    line-height: 1;
    pointer-events: none;
  }

  /* ── Preview pane ── */
  #preview-pane {
    flex: 0 0 55%;
    min-width: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    overflow: hidden;
  }

  #zoom-controls {
    display: flex;
    align-items: center;
    gap: 3px;
  }
  #zoom-controls button {
    padding: 2px 8px;
    font-size: 14px;
    border-radius: 5px;
    line-height: 1;
  }
  #zoom-label {
    font-size: 11px;
    color: var(--text2);
    min-width: 38px;
    text-align: center;
    font-weight: 400;
  }

  #error-box {
    display: none;
    margin: 8px 12px;
    padding: 10px 14px;
    background: var(--error-bg);
    color: var(--error-text);
    border: 1px solid currentColor;
    border-radius: 8px;
    font-family: 'Menlo', monospace;
    font-size: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    flex-shrink: 0;
  }

  #preview {
    flex: 1;
    overflow: hidden;
    padding: 20px;
    position: relative;
  }
  #preview svg {
    max-width: none;
    display: block;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.10));
  }

  /* ── Responsive ── */
  @media (max-width: 650px) {
    #main-container { flex-direction: column; }
    #editor-pane, #preview-pane { flex: 0 0 50% !important; min-height: 0; }
    #divider { flex: 0 0 4px; cursor: row-resize; }
  }
</style>
</head>
<body>

<div id="toolbar">
  <span class="logo">⬡ Mermaid Editor</span>
  <div class="sep"></div>

  <select id="examples-dropdown">
    <option value="">Beispiele ▾</option>
    <option value="flowchart">Flowchart</option>
    <option value="sequence">Sequence</option>
    <option value="class">Class</option>
    <option value="state">State</option>
    <option value="er">ER-Diagramm</option>
    <option value="gantt">Gantt</option>
    <option value="pie">Pie Chart</option>
    <option value="git">Git Graph</option>
    <option value="mindmap">Mindmap</option>
    <option value="timeline">Timeline</option>
  </select>

  <div class="sep"></div>

  <button id="export-svg">↓ SVG</button>
  <button id="export-png">↓ PNG</button>

  <div class="sep"></div>

  <button id="theme-btn">☾ Dunkel</button>

  <div id="diagram-badge">
    Typ: <span id="diagram-type">—</span>
  </div>
</div>

<div id="main-container">

  <div id="editor-pane">
    <div class="pane-header">
      Editor
      <span>Strg+Enter zum Rendern</span>
    </div>
    <div id="editor-container"></div>
  </div>

  <div id="divider"></div>

  <div id="preview-pane">
    <div class="pane-header">
      Vorschau – Ziehen zum Verschieben · Mausrad zum Zoomen
      <div id="zoom-controls">
        <button id="zoom-out" title="Herauszoomen">−</button>
        <span id="zoom-label">100%</span>
        <button id="zoom-in" title="Hineinzoomen">+</button>
        <button id="reset-view" title="Ansicht zurücksetzen">↺</button>
      </div>
    </div>
    <div id="error-box"></div>
    <div id="preview"></div>
  </div>

</div>

</body>
</html>
